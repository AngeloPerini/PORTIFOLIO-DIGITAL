  <head>
    <meta charset="UTF-8" />

    <meta

    <meta name="theme-color" content="#07111f" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Angelo Perini | Desenvolvedor Web" />
    <meta
      property="og:description"
      content="Portfólio profissional de Angelo Perini, com projetos em desenvolvimento web, sistemas personalizados e soluções digitais."
    />
    <meta property="og:image" content="/favicon.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script type="text/javascript">
      (function (location) {
        if (location.search.startsWith('?/')) {
          const decoded = location.search
            .slice(1)
            .split('&')
            .map((segment) => segment.replace(/~and~/g, '&'))
            .join('?');

          window.history.replaceState(null, '', `${location.pathname}${decoded}${location.hash}`);
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
